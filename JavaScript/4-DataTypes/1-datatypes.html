        // Rounding
        // 1. Math.floor()
        // 2. Math.ceil()
        // 3. Math.round()
        // 4. Math.trunc()

        // Math.floor()
        // Round down the given decimal number
        console.log(Math.floor(5.1)); // 5
        console.log(Math.floor(-1.1)); // -2

        // Math.ceil()
        // Round up the given decimal number
        console.log(Math.ceil(5.1)); // 6
        console.log(Math.ceil(-1.1)); // -1

        // Math.round()
        // Rounds the decimal number to the nearby integer (whole number)
        console.log(Math.round(5.4)); // 5 (breaking point is => .4 i.e <= .4 rounds down to the nearby integer)
        console.log(Math.round(5.5)); // 6 (breaking point is => .5 i.e >= .5 rounds up to the nearby integer)
        console.log(Math.round(5.9)); // 6

        // Math.trunc()
        // Removes anything next to the decimal point
        console.log(Math.trunc(5.4)); // 5
        console.log(Math.trunc(5.9)); // 5
